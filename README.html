<script type="text/markdown" id="md-en"># Maqueen Lab

**Web-based BLE component lab for the DFRobot Maqueen Lite v4 + Mechanic Kits.**

Every actuator and sensor on the Maqueen Lite is reachable from a card in the **🤖 Maqueen** tab — drive the wheels, pose the servos, light the LEDs and NeoPixels, beep the buzzer, ping the ultrasonic, read the IR remote, follow a line. A second **🧪 Playground** tab keeps the legacy bit-playground sub-tabs (Controls, Sensors, Graph, 3D, Bench, More) for free-form micro:bit experiments. All control flows over BLE UART; every command is sequence-numbered and echo-confirmed.

The repo also ships:

- **`labs/`** — 8 single-purpose, kid-friendly **Labs** that each focus on one capability (Joystick, Distance, Music, Servos, IR, Lights, Vision, Co-Pilot). Each Lab pins a faithful right-rail **Message Log** that mirrors the main app's TX/RX format, and themes/langs match the docs surface (`carbon / forest / steel / paper / pearl`).
- **`docs/`** — User Guide, Pinout, Plan, Schematics (FR / EN / AR variants of each).
- **`workshops/`** — printable A4 PDF-grade artifacts: bilingual **manual**, **booklet**, **cheat-cards**, **energizers**, **hub**, plus a kid-attracting **flyer** and **poster** (FR, 8 ans+, comic-book bursts, real QR code → live app, mobile scale-to-fit).

> **Status:** v0.1.60 — Maqueen tab feature-complete; Labs surface (8 labs) shipped; draggable cockpit FABs; brand sweep `ROBI-9 LAB → MAQUEEN LAB`; flyer + poster v2 with QR codes. See [CHANGELOG.md](docs/CHANGELOG.md) for recent work, [plan.md](docs/plan.md) for the original build plan.

**Live:** https://abourdim.github.io/maqueen-lab/

---

## Hardware

DFRobot Maqueen Lite v4 (ROB0148) — micro:bit-based educational robot. Optional Mechanic Kits: Forklift (ROB0156-F), Loader (ROB0156-L), Beetle gripper (ROB0156-B), Push (ROB0156-P).

### Pin map (quick reference)

| Pin | Used by | Notes |
|---|---|---|
| P0 | Buzzer | Default `music` pin |
| P1 | Ultrasonic TRIG | Conflict: Gravity port |
| P2 | Ultrasonic ECHO | Conflict: Gravity port |
| P8 | LED Left (simple) | Digital ON/OFF |
| P12 | LED Right (simple) | Digital ON/OFF |
| P13 | Line sensor Left | Digital 0/1 |
| P14 | Line sensor Right | Digital 0/1 |
| P19/P20 | I2C bus | Motor + RGB + Servos at addr **0x10** |

### I2C 0x10 register map

| Register | Function |
|---|---|
| `0x00` | Motor M1 (left) |
| `0x02` | Motor M2 (right) |
| `0x14` | Servo S1 |
| `0x15` | Servo S2 |
| `0x32` | 4× RGB LED data |

Full pinout, conflict warnings, and protocol spec live in [docs/USER_GUIDE.md](docs/USER_GUIDE.md).

---

## Quick start

1. Flash `firmware/v1-maqueen-lib.ts` to your micro:bit (paste into [makecode.microbit.org](https://makecode.microbit.org), add the `pxt-maqueen` extension, download `.hex`).
2. Power on the Maqueen Lite.
3. Open the web app in Chrome / Edge (Web Bluetooth required).
4. Click **Connect**, pair with `BBC micro:bit [xxxxx]`.
5. Pick a Component Explorer and play.

---

## Run locally

**TL;DR — don't double-click `index.html`.** Chromium's CORS rules block
`fetch()` of `manifest.json` / `product.json` / `build-info.json` from the
`file://` protocol. The app degrades gracefully (no functional impact) but
the DevTools console fills with red errors, the PWA install prompt won't
appear, and the Service Worker can't register.

Pick whichever launcher you have handy — they all serve `http://localhost:8000`:

| Platform | Command | Notes |
|---|---|---|
| **Windows** | double-click `serve.bat` | tries Python, falls back to `npx serve` |
| **macOS / Linux** | `./serve.sh` | tries Python, falls back to `npx serve` |
| **Any with Python 3.7+** | `python tools/serve.py` | stdlib only, no install |
| **Any with Node** | `npm run serve` | uses `npx serve` (CDN one-shot) |
| **Any with Python via npm** | `npm run serve:py` | runs `tools/serve.py` |

The Python launcher accepts a custom port (`python tools/serve.py 8765`)
and auto-opens your default browser unless `MAQUEEN_NO_BROWSER=1` is set.

## Architecture

- **Web app**: vanilla JS + SVG + CSS. No framework. PWA-installable.
- **BLE**: Web Bluetooth → micro:bit Bluetooth UART service. Single global write serializer awaits each `writeValue()` Promise — no `NetworkError: GATT operation already in progress`. Connection state is broadcast via DOM signal + MutationObserver; pending sends reject on disconnect.
- **Protocol**: every command carries a sequence number. Micro:bit replies `ECHO:N <verb>`. Web app surfaces sent / echoed / lost / avg-latency on the live sensor strip's BLE bench chip. `HELLO`/`HELLO:<ver>` reports firmware version on the Connect card.
- **Sensor streams**: ACC / LIGHT / SOUND auto-stream with a heartbeat (≥ once per ~500–1000 ms) so the Graph never looks frozen. Off by default — flip the `streams: ON/OFF` chip in the live strip, or enter the Sensors / Graph / 3D tab and they auto-arm. DIST / LINE / IR are polled on demand with per-poll-rate sliders (200–2000 ms, persisted in localStorage). Auto-pollers pause when leaving the Maqueen tab to spare BLE bandwidth.
- **Firmware**: stays dumb. Web app drives all animations (sweep, blink, rainbow, follow-line tick) via streamed commands.
- **USB serial mirror** at 115200 baud — boot banner, RX/TX log, executed commands. Useful for debugging without the web app.

### Build / firmware version

The pre-commit hook auto-bumps `BUILD_VERSION` **only** when `firmware/v1-maqueen-lib.ts` is in the staged change. Docs-only commits no longer bump the version — the stamp tracks real firmware churn. The `.hex` is **not** auto-compiled; rebuild it in MakeCode and re-flash when the version changes (see the User Guide's "Building the firmware .hex" section).

See [plan.md](docs/plan.md) for the full plan.

---

## Forked from

This project forks [bit-playground](https://github.com/abourdim/bit-playground) v1.2.0 — its BLE layer, sensor graph engine, and i18n machinery are reused as-is. **The BLE layer (`js/ble.js`) is treated as a stable dependency and not modified in this fork.**

## Architecture

- **App web** : JS + SVG + CSS purs. Pas de framework. Installable en PWA.
- **BLE** : Web Bluetooth → service Bluetooth UART du micro:bit. Un sérialiseur global d'écriture attend chaque promesse `writeValue()` — plus de `NetworkError: GATT operation already in progress`. L'état de connexion est diffusé via signal DOM + MutationObserver ; les envois en attente sont rejetés à la déconnexion.
- **Protocole** : chaque commande porte un numéro de séquence. Le micro:bit répond `ECHO:N <verb>`. L'app web affiche envoyés / écho / perdus / latence-moy sur la puce BLE bench du bandeau capteurs. `HELLO`/`HELLO:<ver>` rapporte la version du firmware sur la carte Connect.
- **Flux capteurs** : ACC / LIGHT / SOUND streament en continu avec un battement (≥ une fois par ~500–1000 ms) pour que le Graph n'ait jamais l'air figé. Désactivés par défaut — bascule la puce `streams: ON/OFF` dans le bandeau, ou entre dans Sensors / Graph / 3D et ils s'arment automatiquement. DIST / LINE / IR sont sondés à la demande avec sliders de fréquence (200–2000 ms, persistés en localStorage). Les sondes auto se mettent en pause quand on quitte l'onglet Maqueen pour préserver la bande BLE.
- **Firmware** : reste bête. L'app web pilote toutes les animations (balayage, clignotement, arc-en-ciel, tick suivi de ligne) via commandes streamées.
- **Miroir USB série** à 115200 baud — bannière de boot, log RX/TX, commandes exécutées. Utile pour déboguer sans l'app web.

### Version build / firmware

Le hook pre-commit auto-incrémente `BUILD_VERSION` **uniquement** quand `firmware/v1-maqueen-lib.ts` fait partie du commit. Les commits docs-seuls n'incrémentent plus la version — le tampon suit désormais les vrais changements firmware. Le `.hex` n'est **pas** compilé automatiquement ; reconstruis-le dans MakeCode et reflashe quand la version change (voir la section "Building the firmware .hex" du Guide utilisateur).

Voir [plan.md](docs/plan.md) pour le plan complet.

<script type="text/markdown" id="md-ar"># Maqueen Lab

## التشغيل محلّيًا

**باختصار — لا تنقر مرّتين على `index.html`.** قواعد CORS في Chromium تمنع
`fetch()` لـ`manifest.json` / `product.json` / `build-info.json` من
بروتوكول `file://`. التطبيق يتدهور بلطف (لا أثر وظيفي) لكن
وحدة تحكّم DevTools تمتلئ بالأخطاء الحمراء، ولا يظهر طلب تثبيت PWA،
ولا يستطيع Service Worker التسجيل.

اختر المُشغِّل الذي بحوزتك — كلّها تخدم `http://localhost:8000` :

| المنصّة | الأمر | ملاحظات |
|---|---|---|
| **Windows** | نقرة مزدوجة `serve.bat` | يجرِّب Python، ثمّ `npx serve` |
| **macOS / Linux** | `./serve.sh` | يجرِّب Python، ثمّ `npx serve` |
| **أيّ نظام مع Python 3.7+** | `python tools/serve.py` | المكتبة القياسيّة فقط، بدون تثبيت |
| **أيّ نظام مع Node** | `npm run serve` | يستخدم `npx serve` (one-shot من CDN) |
| **Python عبر npm** | `npm run serve:py` | يشغِّل `tools/serve.py` |

مُشغِّل Python يقبل منفذًا مخصَّصًا (`python tools/serve.py 8765`)
ويفتح المتصفِّح الافتراضي إلّا إذا ضُبط `MAQUEEN_NO_BROWSER=1`.

## البنية

- **تطبيق الويب** : JS + SVG + CSS عاديّون. لا إطار. قابل للتثبيت كـPWA.
- **BLE** : Web Bluetooth → خدمة Bluetooth UART لـmicro:bit. مُسلسِل عالميّ واحد للكتابة ينتظر كلّ وعد `writeValue()` — لا مزيد من `NetworkError: GATT operation already in progress`. حالة الاتّصال تُبثّ عبر إشارة DOM + MutationObserver ؛ الإرسالات المعلّقة تُرفض عند الانفصال.
- **البروتوكول** : كلّ أمر يحمل رقم تسلسل. يردّ micro:bit بـ`ECHO:N <verb>`. يعرض تطبيق الويب المُرسَل / المُصدى / المفقود / متوسّط زمن الاستجابة على رقاقة BLE bench في شريط المستشعرات. `HELLO`/`HELLO:<ver>` يبلِّغ نسخة البرنامج الثابت على بطاقة Connect.
- **تدفّقات المستشعرات** : ACC / LIGHT / SOUND تتدفّق تلقائيًّا مع نبضة قلب (≥ مرّة كلّ ~500–1000 ميلي ثانية) كي لا يبدو Graph مجمَّدًا. مغلقة افتراضيًّا — اقلب رقاقة `streams: ON/OFF` في الشريط، أو ادخل تبويب Sensors / Graph / 3D وستتسلَّح تلقائيًّا. DIST / LINE / IR تُسبَر عند الطلب مع شرائح معدّل سبر (200–2000 مللي ثانية، محفوظة في localStorage). تتوقَّف الموسوبات تلقائيًّا عند مغادرة تبويب Maqueen لتوفير عرض BLE.
- **البرنامج الثابت** : يبقى غبيًّا. تطبيق الويب يقود كلّ الرسوم المتحرّكة (مسح، وميض، قوس قزح، تكّة متابعة الخطّ) عبر أوامر متدفّقة.
- **مرآة USB التسلسليّة** بسرعة 115200 baud — لافتة الإقلاع، سجلّ RX/TX، الأوامر المنفَّذة. مفيدة للتنقيح بدون تطبيق الويب.

### نسخة البناء / البرنامج الثابت

خطّاف pre-commit يرفع `BUILD_VERSION` تلقائيًّا **فقط** عندما يكون `firmware/v1-maqueen-lib.ts` ضمن التغيير المهيَّأ. لم تعد commits الوثائق وحدها ترفع النسخة — صار الختم يتتبَّع تغييرات البرنامج الثابت الحقيقيّة. ملفّ `.hex` **لا** يُترجَم تلقائيًّا ؛ أعِد بناءه في MakeCode وأعِد الفلش عند تغيير النسخة (انظر قسم "Building the firmware .hex" في دليل المستخدم).

راجع [plan.md](docs/plan.md) للخطّة الكاملة.
